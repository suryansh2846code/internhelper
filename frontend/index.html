<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InternHelper</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css?v=21" />
</head>
<body>
  <div class="app">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="brand"><span class="brand-mark">⚡</span> InternHelper</div>

      <nav class="nav">
        <a href="#resume-panel" class="nav-item" data-nav>Résumés</a>
        <a href="#search-panel" class="nav-item" data-nav>Search</a>
        <a href="#results-panel" class="nav-item" data-nav>Results</a>
        <button class="nav-item" id="applied-btn" onclick="toggleApplied()">Applied</button>
        <button class="nav-item" onclick="loadDemo()">🎲 Demo cards</button>
      </nav>

      <div class="sidebar-foot">
        <div id="platform-logins" class="login-btns"></div>
        <button id="relogin-btn" class="btn-ghost" onclick="relogin()">Re-login to Internshala</button>
        <span id="auth-status" class="status-msg"></span>
      </div>
    </aside>

    <!-- MAIN -->
    <main class="content">
      <header class="page-head">
        <div>
          <h1>Find &amp; auto-apply to internships</h1>
          <p class="page-sub">AI-matched listings across Internshala &amp; Unstop</p>
        </div>
      </header>

      <!-- APPLIED HISTORY -->
      <section id="applied-panel" class="card hidden">
        <div class="section-head">
          <h2>Applied history</h2>
          <button class="btn-sm btn-skip" onclick="clearApplied()">Clear all</button>
        </div>
        <div id="applied-list"></div>
      </section>

      <!-- STEP 1: RESUMES -->
      <section class="card" id="resume-panel">
        <div class="section-head">
          <div class="step-head"><span class="step-pill">1</span><h2>Upload your résumés</h2></div>
        </div>
        <p class="step-hint">One résumé per role — AI suggests search keywords from each.</p>
        <div class="upload-row">
          <input type="text" id="role-input" placeholder="Role label  ·  e.g. frontend, backend, fullstack" />
          <label class="btn-upload">
            Choose file
            <input type="file" id="resume-file" accept=".pdf,.txt,.docx,.png,.jpg,.jpeg,.webp" style="display:none" />
          </label>
          <span id="upload-status" class="status-msg"></span>
        </div>
        <div id="resume-cards"></div>
      </section>

      <!-- STEP 2: SEARCH -->
      <section class="card" id="search-panel">
        <div class="section-head">
          <div class="step-head"><span class="step-pill">2</span><h2>Search settings</h2></div>
        </div>
        <div class="form-grid">
          <label>Platforms
            <div id="platform-toggles" class="platform-toggles"></div>
          </label>
          <label>Location
            <input type="text" id="location" value="work from home" />
          </label>
          <label>Min stipend (₹/month)
            <input type="number" id="stipend" value="0" min="0" step="1000" />
          </label>
          <label>Max listings per role
            <input type="number" id="max" value="10" min="1" max="30" />
          </label>
        </div>
        <button id="search-btn" class="btn-primary" onclick="startSearch()">Search all roles →</button>
        <div id="search-status" class="status-msg"></div>
      </section>

      <!-- STEP 3: RESULTS -->
      <section id="results-panel" class="hidden">
        <div class="results-header">
          <h2 id="results-title">Found listings</h2>
          <div id="role-filters"></div>
        </div>
        <div id="bulk-bar" class="bulk-bar" style="display:none"></div>
        <div id="listings-grid"></div>
      </section>
    </main>
  </div>

  <!-- BOTTOM STATUS BAR -->
  <footer class="statusbar">
    <span class="statusbar-dot" id="statusbar-dot"></span>
    <span id="statusbar-info" class="statusbar-info">Ready</span>
    <button id="stop-browser-btn" class="btn-ghost" onclick="closeBrowser()" style="display:none">✕ Close browser window</button>
  </footer>

  <!-- REVIEW MODAL -->
  <div id="modal-overlay" class="hidden" onclick="closeModal(event)">
    <div class="modal">
      <button class="modal-close" onclick="closeModalDirect()">✕</button>
      <div id="modal-content"></div>
    </div>
  </div>

  <script src="/static/app.js?v=21"></script>
</body>
</html>
